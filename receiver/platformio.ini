; PlatformIO Project Configuration File
; Fox Hunter - Receiver firmware
; Hardware: Seeed Wio Tracker L1 (nRF52840 + SX1262 + SH1106 OLED + joystick)

[platformio]
boards_dir = ../boards

[env:foxhunter_receiver]
platform = nordicnrf52
platform_packages =
  framework-arduinoadafruitnrf52 @ 1.10700.0
board = seeed-wio-tracker-l1
board_build.ldscript = ../boards/nrf52840_s140_v7.ld
framework = arduino
monitor_speed = 115200
upload_protocol = nrfutil
extra_scripts = post:create-uf2.py

lib_deps =
  SPI
  Wire
  jgromes/RadioLib @ ^7.3.0
  adafruit/Adafruit SH110X @ ^2.1.13
  adafruit/Adafruit GFX Library @ ^1.12.1

build_flags =
  -I variants/wio-tracker-l1
  -D PIN_OLED_RESET=-1
  -D SX126X_RXEN=5
  -D SX126X_TXEN=RADIOLIB_NC
  -DRADIOLIB_STATIC_ONLY=1
  -DRADIOLIB_GODMODE=1
  -DRADIOLIB_EXCLUDE_CC1101=1
  -DRADIOLIB_EXCLUDE_RF69=1
  -DRADIOLIB_EXCLUDE_SX1231=1
  -DRADIOLIB_EXCLUDE_SI443X=1
  -DRADIOLIB_EXCLUDE_RFM2X=1
  -DRADIOLIB_EXCLUDE_SX128X=1
  -DRADIOLIB_EXCLUDE_AFSK=1
  -DRADIOLIB_EXCLUDE_AX25=1
  -DRADIOLIB_EXCLUDE_HELLSCHREIBER=1
  -DRADIOLIB_EXCLUDE_MORSE=1
  -DRADIOLIB_EXCLUDE_APRS=1
  -DRADIOLIB_EXCLUDE_BELL=1
  -DRADIOLIB_EXCLUDE_RTTY=1
  -DRADIOLIB_EXCLUDE_SSTV=1

build_src_filter =
  +<*.cpp>
  +<../variants/wio-tracker-l1/variant.cpp>
